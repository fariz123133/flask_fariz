<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diabetes Prediction</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 font-sans text-slate-800">

    <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
        <div class="bg-blue-600 px-6 py-5">
            <h2 class="text-2xl font-bold text-white text-center tracking-wide">Prediksi Risiko Diabetes</h2>
            <p class="text-blue-100 text-center text-sm mt-1">Masukkan data medis pasien pada form di bawah ini</p>
        </div>

        <div class="p-8">
            <form action="{{ url_for('predict') }}" method="post" class="space-y-6">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Kehamilan (Pregnancies)</label>
                        <input type="number" step="any" name="Pregnancies" required placeholder="Contoh: 2" 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Glukosa (Glucose)</label>
                        <input type="number" step="any" name="Glucose" required placeholder="Contoh: 120" 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Tekanan Darah (BloodPressure)</label>
                        <input type="number" step="any" name="BloodPressure" required placeholder="Contoh: 70" 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Ketebalan Kulit (SkinThickness)</label>
                        <input type="number" step="any" name="SkinThickness" required placeholder="Contoh: 20" 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Insulin</label>
                        <input type="number" step="any" name="Insulin" required placeholder="Contoh: 85" 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">BMI</label>
                        <input type="number" step="any" name="BMI" required placeholder="Contoh: 25.5" 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Riwayat (Pedigree Function)</label>
                        <input type="number" step="any" name="DiabetesPedigreeFunction" required placeholder="Contoh: 0.5" 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50 focus:bg-white">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Usia (Age)</label>
                        <input type="number" step="any" name="Age" required placeholder="Contoh: 45" 
                               class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all bg-slate-50 focus:bg-white">
                    </div>
                </div>

                <div class="pt-4">
                    <button type="submit" 
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        Analisis & Prediksi
                    </button>
                </div>
            </form>

            {% if prediction_text %}
            <div class="mt-8 p-5 rounded-lg border-l-4 shadow-sm
                {% if 'Positif' in prediction_text %} 
                    bg-red-50 border-red-500 text-red-800 
                {% else %} 
                    bg-emerald-50 border-emerald-500 text-emerald-800 
                {% endif %}">
                <div class="flex items-center">
                    {% if 'Positif' in prediction_text %}
                        <svg class="w-6 h-6 mr-3 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    {% else %}
                        <svg class="w-6 h-6 mr-3 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    {% endif %}
                    <h3 class="text-lg font-bold tracking-tight">{{ prediction_text }}</h3>
                </div>
            </div>
            {% endif %}

        </div>
    </div>

</body>
</html>
